# =====================================================================
# clients/_schema.yaml — Esquema canônico de configuração por prefeitura
#
# Este arquivo é a referência de TODOS os campos suportados em
# clients/<slug>.yaml. Atualize aqui sempre que adicionar/remover
# uma chave; o validador (Fase 4) usa isto como fonte da verdade.
#
# Convenções:
#   - Campos com "<...>" são placeholders obrigatórios.
#   - Campos comentados ("# campo: ...") são opcionais.
#   - Segredos NUNCA vão neste arquivo — vão em .env.<slug>.
# =====================================================================

# ─── Identificação ──────────────────────────────────────────────────
slug: <slug>                            # ex.: barueri (lowercase, sem espaços/hifens)
display_name: <Nome de exibição>        # ex.: "Prefeitura de Barueri"
domain: <host.tld>                      # ex.: telemetria.barueri.gov.br
timezone: America/Sao_Paulo             # IANA tz; converte UTC -> local no front

# ─── Branding ───────────────────────────────────────────────────────
branding:
  primary_color: "#0B5394"              # cor principal (hex)
  secondary_color: "#F4B400"            # cor secundária (hex)
  app_title: <Título da aba>            # ex.: "Telemetria Barueri"
  logo_path: assets/clients/<slug>/logo.svg
  favicon_path: assets/clients/<slug>/favicon.ico

# ─── PostgreSQL (referência; credenciais em .env.<slug>) ────────────
database:
  host: <ip_privado_vps3>
  port: 5432
  name: telemetry_<slug>_<env>          # ex.: telemetry_barueri_prod
  user: telemetry_app
  pool_size: 5
  pool_max_overflow: 2
  # password: vem de TELEMETRY_DB_PASSWORD no .env.<slug>

# ─── MQTT (referência; credenciais em .env.<slug>) ──────────────────
mqtt:
  host: <mqtt.example.com>
  port: 8883
  tls: true
  ca_cert_path: /etc/telemetry/certs/ca.crt
  username: telemetry_<slug>_bridge
  client_id: telemetry-bridge-<slug>
  keepalive: 30
  topic_prefix: telemetry/<slug>        # publicação e assinatura sempre sob este prefixo
  # password: vem de TELEMETRY_MQTT_PASSWORD no .env.<slug>

# ─── Workers ────────────────────────────────────────────────────────
workers:
  batch_size: 50
  idle_seconds: 5
  stuck_threshold_seconds: 300          # watchdog: registros 'processing' há mais que isto voltam para 'pending'
  max_attempts: 5
  backoff_schedule_seconds: [60, 300, 900, 3600, 21600]

# ─── Retenção (políticas por tabela) ────────────────────────────────
retention:
  raw_messages_days: 90                 # tabela normal; cleanup via cron
  parsed_measurements_days: 730         # hypertable; add_retention_policy
  derived_metrics_days: 1825            # hypertable; add_retention_policy
  alert_events_days: 1825
  auth_logs_days: 180

# ─── Limiares default de alerta (override por instalação possível) ──
alert_defaults:
  level_critical_pct: 25                # nível < 25% → crítico
  level_warning_pct: 60                 # nível < 60% → atenção
  # Pressão da rua (Copasa nominal: 30 MCA — pisos absolutos, independem de baseline)
  street_pressure_moderado_mca: 15      # pressão < 15 MCA → moderado
  street_pressure_alto_mca: 10          # pressão < 10 MCA → alto
  street_pressure_critico_mca: 5        # pressão < 5 MCA → crítico
  pressure_high_mca: 45                 # pressão > 45 MCA → crítico
  flow_no_signal_lph: 1                 # vazão <= 1 L/h → "sem fluxo"
  flow_low_lph: 120
  flow_high_lph: 1500
  telemetry_stale_minutes: 120          # sem update há mais de X min → alerta
  reservoir_default_volume_m3: 30       # autonomia (quando instalação não declara o seu)
  autonomy_critical_hours: 24
  autonomy_warning_hours: 72
  leak_danger_ratio: 1.7                # consumo 24h vs 30d >= 1.7x → possível vazamento
  leak_warning_ratio: 1.3
  low_consumption_ratio: 0.4

# ─── Admin inicial (criado no bootstrap) ────────────────────────────
admin:
  email: <admin@prefeitura.gov.br>
  # password inicial: TELEMETRY_ADMIN_INITIAL_PASSWORD no .env.<slug>

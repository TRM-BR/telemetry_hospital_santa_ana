# alembic.ini — Configuração do Alembic para o backend telemetry.
# A URL do banco é lida de TELEMETRY_DB_* via env.py (não hardcoded aqui).

[alembic]
script_location = alembic
prepend_sys_path = .

# Formato do nome dos arquivos de versão
file_template = %%(rev)s_%%(slug)s

# Timezone para mensagens de log do Alembic
timezone = UTC

# Trunca mensagens longas nos logs
truncate_slug_length = 40

# Não modificar: revisionamento linear
revision_environment = false
sourceless = false
version_locations = %(here)s/alembic/versions
version_path_separator = os

[post_write_hooks]
# hooks desativados (ruff formata ao commitar)

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

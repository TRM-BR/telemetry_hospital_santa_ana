# deploy/nginx.conf — Hospital Santa Ana POC
# Serve o build estático do React na porta 8082.
# Sem API, sem HTTPS nesta etapa (POC local).

server {
    listen 8082;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: qualquer rota desconhecida cai no index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache longo para assets versionados pelo Vite (hash no nome)
    location ~* \.(js|css|png|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Sem cache para o index.html (sempre atualizado a cada build)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}

# deploy/nginx.conf — Hospital Santa Ana POC
# Serve o build estático do React na porta 8082 + proxy /api para a API.
# Sem HTTPS nesta etapa (POC local).
#
# Requisito de rede: este nginx precisa estar na MESMA rede docker do
# container `hospital-santa-ana-api-test` para resolver o nome.
# (ex.: definir `networks:` compartilhada no docker-compose.)

server {
    listen 8082;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy da API — encaminha /api/ para o backend FastAPI.
    # Mantém o prefixo /api (a API monta as rotas sob /api/v1).
    location /api/ {
        proxy_pass http://hospital-santa-ana-api-test:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # SPA: qualquer rota desconhecida cai no index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache longo para assets versionados pelo Vite (hash no nome)
    location ~* \.(js|css|png|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Sem cache para o index.html (sempre atualizado a cada build)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
